<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scanner — ChronicWaves</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root { --bg:#0d0d0d; --card:#161616; --border:#222; --text:#f0f0f0; --muted:#666; --accent:#c084fc; --dim:#2a2a2a; --success:#4ade80; --danger:#f87171; --warn:#fb923c; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; padding:28px 16px 60px; }
.container { max-width:480px; margin:0 auto; }
.header { text-align:center; margin-bottom:24px; }
.tag { font-size:10px; letter-spacing:4px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.logo { font-family:'Syne',sans-serif; font-size:clamp(28px,8vw,44px); font-weight:800; color:var(--text); line-height:1; margin-bottom:4px; }
.sub { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--accent); font-family:'Syne',sans-serif; font-weight:600; }
.nav { display:flex; justify-content:center; gap:8px; margin:20px 0 24px; flex-wrap:wrap; }
.nav a { padding:7px 14px; border-radius:7px; border:1px solid var(--border); color:var(--muted); font-size:11px; text-decoration:none; transition:all 0.2s; }
.nav a:hover, .nav a.active { border-color:#444; color:var(--text); background:var(--dim); }

.scanner-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:22px; margin-bottom:14px; }
.sec-title { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:18px; padding-bottom:10px; border-bottom:1px solid var(--border); }

/* QR reader container */
#qr-reader { width:100%; border-radius:10px; overflow:hidden; margin-bottom:14px; display:none; }
#qr-reader video { border-radius:10px; }

.scan-status { text-align:center; font-size:13px; color:var(--muted); margin-bottom:14px; min-height:18px; }

.start-btn { width:100%; padding:13px; background:var(--text); border:none; border-radius:9px; color:#000; font-family:'Syne',sans-serif; font-size:14px; font-weight:800; letter-spacing:2px; cursor:pointer; transition:all 0.2s; text-transform:uppercase; }
.start-btn:hover { background:#ddd; }
.stop-btn { width:100%; padding:13px; background:transparent; border:1px solid var(--border); border-radius:9px; color:var(--muted); font-family:'Syne',sans-serif; font-size:14px; font-weight:700; letter-spacing:2px; cursor:pointer; margin-top:10px; transition:all 0.2s; text-transform:uppercase; display:none; }
.stop-btn:hover { border-color:#444; color:var(--text); }

/* Manual */
.divider { text-align:center; color:var(--muted); font-size:11px; margin:16px 0; position:relative; }
.divider::before,.divider::after { content:''; position:absolute; top:50%; width:42%; height:1px; background:var(--border); }
.divider::before { left:0; } .divider::after { right:0; }
.manual-row { display:flex; gap:8px; }
.manual-input { flex:1; background:#0d0d0d; border:1px solid var(--border); border-radius:7px; padding:10px 13px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s; }
.manual-input:focus { border-color:#444; }
.manual-btn { padding:10px 18px; background:var(--dim); border:1px solid var(--border); border-radius:7px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; transition:all 0.2s; }
.manual-btn:hover { border-color:#444; }

/* Result */
#result { display:none; }
.result-card { border-radius:12px; padding:28px 22px; margin-bottom:16px; text-align:center; border:1px solid; }
.result-card.success { background:rgba(74,222,128,0.06); border-color:rgba(74,222,128,0.25); }
.result-card.error { background:rgba(248,113,113,0.06); border-color:rgba(248,113,113,0.25); }
.result-card.warning { background:rgba(251,146,60,0.06); border-color:rgba(251,146,60,0.25); }
.result-icon { font-size:44px; margin-bottom:12px; }
.result-title { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; letter-spacing:1px; margin-bottom:6px; }
.result-card.success .result-title { color:var(--success); }
.result-card.error .result-title { color:var(--danger); }
.result-card.warning .result-title { color:var(--warn); }
.result-name { font-size:20px; font-weight:700; color:var(--text); margin-bottom:4px; }
.result-sub { font-size:13px; color:var(--muted); margin-bottom:14px; }
.members-pill { display:inline-flex; align-items:center; gap:6px; border:1px solid var(--border); border-radius:20px; padding:8px 18px; font-size:15px; font-weight:700; color:var(--text); margin:6px 0 16px; }
.scan-again-btn { padding:11px 28px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--muted); font-family:'Syne',sans-serif; font-size:13px; font-weight:700; letter-spacing:1.5px; cursor:pointer; transition:all 0.2s; text-transform:uppercase; }
.scan-again-btn:hover { border-color:#444; color:var(--text); }

/* Log */
.log-section { margin-top:14px; }
.log-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.log-title { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
.log-count { background:var(--dim); color:var(--muted); font-family:'DM Sans',sans-serif; font-size:11px; font-weight:700; border-radius:20px; padding:2px 9px; }
.log-list { display:flex; flex-direction:column; gap:8px; }
.log-item { background:var(--card); border:1px solid var(--border); border-radius:9px; padding:12px 14px; display:flex; align-items:center; gap:12px; }
.log-icon { font-size:18px; flex-shrink:0; }
.log-info { flex:1; min-width:0; }
.log-name { font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.log-meta { font-size:11px; color:var(--muted); margin-top:2px; }
.log-members { font-size:12px; font-weight:600; color:var(--muted); flex-shrink:0; }
.empty-log { text-align:center; color:var(--muted); font-size:13px; padding:20px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="tag">AfterParty · Gate Scanner</div>
    <div class="logo">CHRONIC<br>WAVES</div>
    <div class="sub">The Darkhouse</div>
  </div>

  <div class="nav">
    <a href="1-admin-panel.html">Admin</a>
    <a href="2-scanner.html" class="active">Scanner</a>
    <a href="3-registration.html">Register</a>
    <a href="4-dashboard.html">Dashboard</a>
  </div>

  <div class="scanner-card" id="scannerCard">
    <div class="sec-title">Scan QR Code</div>
    <div id="qr-reader"></div>
    <div class="scan-status" id="scanStatus">Camera not started</div>
    <button class="start-btn" id="startBtn" onclick="startCamera()">📷 START CAMERA</button>
    <button class="stop-btn" id="stopBtn" onclick="stopCamera()">⏹ STOP CAMERA</button>
    <div class="divider">OR ENTER TICKET ID</div>
    <div class="manual-row">
      <input type="text" class="manual-input" id="manualInput" placeholder="TKT-XXXX-XXXX" onkeydown="if(event.key==='Enter')manualScan()"/>
      <button class="manual-btn" onclick="manualScan()">Verify</button>
    </div>
  </div>

  <div id="result">
    <div class="result-card" id="resultCard">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-name" id="resultDetail"></div>
      <div class="result-sub" id="resultSub"></div>
      <div class="members-pill" id="resultMembers" style="display:none"></div>
      <button class="scan-again-btn" onclick="scanAgain()">↩ SCAN NEXT</button>
    </div>
  </div>

  <div class="log-section">
    <div class="log-header">
      <div class="log-title">Today's Scans</div>
      <span class="log-count" id="logCount">0</span>
    </div>
    <div class="log-list" id="logList"><div class="empty-log">No scans yet</div></div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbziK5ejeBR418BAAQDIrsLQFS3CYyZL2TwC0daQkEvkMyfyWhW2JCJes82D1pCtz3TzaA/exec';
let html5QrCode = null;
let scanLog = [];
let isProcessing = false;

async function startCamera() {
  document.getElementById('qr-reader').style.display = 'block';
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'block';
  document.getElementById('scanStatus').textContent = '🔍 Point camera at QR code...';

  html5QrCode = new Html5Qrcode('qr-reader');
  try {
    await html5QrCode.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 240, height: 240 } },
      (decodedText) => {
        if (!isProcessing) {
          isProcessing = true;
          stopCamera();
          processQR(decodedText);
        }
      },
      () => {}
    );
  } catch (err) {
    document.getElementById('scanStatus').textContent = '❌ Camera access denied. Use manual entry below.';
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('stopBtn').style.display = 'none';
    document.getElementById('qr-reader').style.display = 'none';
  }
}

async function stopCamera() {
  if (html5QrCode) {
    try { await html5QrCode.stop(); } catch(e) {}
    html5QrCode = null;
  }
  document.getElementById('qr-reader').style.display = 'none';
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('scanStatus').textContent = 'Camera stopped';
}

async function manualScan() {
  const val = document.getElementById('manualInput').value.trim().toUpperCase();
  if (!val) return;
  isProcessing = true;
  await validateTicket(val);
  document.getElementById('manualInput').value = '';
}

async function processQR(rawData) {
  try {
    const parsed = JSON.parse(rawData);
    const ticketID = parsed.id || parsed.ticketID;
    if (!ticketID) throw new Error('No ID');
    await validateTicket(ticketID);
  } catch {
    showResult('error', '❌', 'INVALID QR', 'This QR code is not recognized', '', null);
    isProcessing = false;
  }
}

async function validateTicket(ticketID) {
  document.getElementById('scanStatus').textContent = '⏳ Verifying...';
  try {
    const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'scanTicket', ticketID }) });
    const data = await res.json();
    if (data.success) {
      showResult('success', '✅', 'ENTRY GRANTED', data.name, `Ticket: ${ticketID}`, data.members);
      addToLog(data.name, data.members, ticketID, true);
    } else if (data.alreadyUsed) {
      showResult('warning', '⛔', 'ALREADY USED', data.name, `Scanned at: ${data.scannedAt}`, data.members);
      addToLog(data.name, data.members, ticketID, false);
    } else {
      showResult('error', '❌', 'INVALID TICKET', data.message || 'Ticket not found', ticketID, null);
    }
  } catch (err) {
    showResult('error', '⚠️', 'NETWORK ERROR', 'Check internet connection', err.message, null);
  }
  isProcessing = false;
}

function showResult(type, icon, title, detail, sub, members) {
  document.getElementById('scannerCard').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('resultCard').className = `result-card ${type}`;
  document.getElementById('resultIcon').textContent = icon;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultDetail').textContent = detail;
  document.getElementById('resultSub').textContent = sub;
  const mb = document.getElementById('resultMembers');
  if (members) { mb.style.display = 'inline-flex'; mb.textContent = `👥 ${members} ${members==1?'Guest':'Guests'} Entering`; }
  else { mb.style.display = 'none'; }
}

function scanAgain() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('scannerCard').style.display = 'block';
  document.getElementById('scanStatus').textContent = 'Camera not started';
  isProcessing = false;
}

function addToLog(name, members, ticketID, granted) {
  const time = new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
  scanLog.unshift({ name, members, ticketID, granted, time });
  document.getElementById('logCount').textContent = scanLog.length;
  document.getElementById('logList').innerHTML = scanLog.length === 0
    ? '<div class="empty-log">No scans yet</div>'
    : scanLog.map(s => `
      <div class="log-item">
        <div class="log-icon">${s.granted ? '✅' : '⛔'}</div>
        <div class="log-info">
          <div class="log-name">${s.name || 'Unknown'}</div>
          <div class="log-meta">${s.ticketID} · ${s.time}</div>
        </div>
        <div class="log-members">👥 ${s.members||1}</div>
      </div>`).join('');
}
</script>
</body>
</html>
