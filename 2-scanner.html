<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QR Scanner — AfterParty</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root { --bg:#0a0a0f; --card:#13131a; --border:#2a2a3a; --accent:#ff3c6e; --accent2:#ff9900; --text:#f0f0f5; --muted:#6b6b80; --success:#00d68f; }
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }
body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 60% 40% at 20% 10%, rgba(255,60,110,0.1) 0%, transparent 60%); pointer-events:none; z-index:0; }
.container { max-width:520px; margin:0 auto; padding:32px 20px; position:relative; z-index:1; }
header { text-align:center; margin-bottom:32px; animation:fadeDown 0.6s ease; }
.event-label { font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--accent); margin-bottom:10px; font-weight:500; }
h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(44px,10vw,72px); line-height:0.9; background:linear-gradient(135deg,#fff 0%,#ff9900 50%,#ff3c6e 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:10px; }
.subtitle { color:var(--muted); font-size:13px; }
.nav-links { display:flex; justify-content:center; gap:10px; margin-bottom:28px; flex-wrap:wrap; }
.nav-btn { padding:8px 18px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--muted); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; text-decoration:none; transition:all 0.2s; display:inline-block; }
.nav-btn:hover { border-color:var(--accent2); color:var(--accent2); }
.nav-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
/* Scanner */
.scanner-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:28px; margin-bottom:24px; animation:fadeUp 0.6s ease 0.1s both; }
.scanner-title { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; color:var(--accent2); margin-bottom:20px; display:flex; align-items:center; gap:10px; }
.scanner-title::before { content:''; display:inline-block; width:4px; height:18px; background:var(--accent2); border-radius:2px; }
.video-wrapper { position:relative; border-radius:14px; overflow:hidden; background:#000; aspect-ratio:1; margin-bottom:16px; }
#video { width:100%; height:100%; object-fit:cover; display:block; }
.scan-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
.scan-frame { width:60%; aspect-ratio:1; border:3px solid var(--accent); border-radius:12px; position:relative; }
.scan-frame::before,.scan-frame::after { content:''; position:absolute; width:20px; height:20px; }
.scan-frame::before { top:-3px; left:-3px; border-top:4px solid var(--accent2); border-left:4px solid var(--accent2); border-radius:4px 0 0 0; }
.scan-frame::after { bottom:-3px; right:-3px; border-bottom:4px solid var(--accent2); border-right:4px solid var(--accent2); border-radius:0 0 4px 0; }
.scan-line { position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); animation:scanAnim 2s linear infinite; top:0; }
.scan-status { text-align:center; font-size:13px; color:var(--muted); margin-bottom:14px; }
.start-btn { width:100%; padding:14px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:12px; color:#fff; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:3px; cursor:pointer; transition:all 0.25s; }
.start-btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(255,60,110,0.4); }
.stop-btn { width:100%; padding:14px; background:rgba(255,60,110,0.1); border:1px solid var(--accent); border-radius:12px; color:var(--accent); font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:3px; cursor:pointer; margin-top:10px; transition:all 0.2s; }
/* Manual input */
.manual-section { margin-top:16px; }
.divider { text-align:center; color:var(--muted); font-size:12px; margin:14px 0; position:relative; }
.divider::before,.divider::after { content:''; position:absolute; top:50%; width:42%; height:1px; background:var(--border); }
.divider::before { left:0; } .divider::after { right:0; }
.manual-row { display:flex; gap:10px; }
.manual-input { flex:1; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:10px; padding:12px 15px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:all 0.2s; }
.manual-input:focus { border-color:var(--accent); background:rgba(255,60,110,0.05); }
.manual-btn { padding:12px 20px; background:var(--card); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; transition:all 0.2s; }
.manual-btn:hover { border-color:var(--accent2); color:var(--accent2); }
/* Result */
#result { display:none; animation:fadeUp 0.4s ease; }
.result-card { border-radius:20px; padding:28px; margin-bottom:20px; text-align:center; }
.result-card.success { background:rgba(0,214,143,0.08); border:2px solid var(--success); }
.result-card.error { background:rgba(255,60,110,0.08); border:2px solid var(--accent); }
.result-card.warning { background:rgba(255,153,0,0.08); border:2px solid var(--accent2); }
.result-icon { font-size:52px; margin-bottom:14px; }
.result-title { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:2px; margin-bottom:8px; }
.result-card.success .result-title { color:var(--success); }
.result-card.error .result-title { color:var(--accent); }
.result-card.warning .result-title { color:var(--accent2); }
.result-detail { font-size:15px; font-weight:600; margin-bottom:4px; }
.result-sub { font-size:13px; color:var(--muted); margin-bottom:14px; }
.members-big { display:inline-flex; align-items:center; gap:8px; background:linear-gradient(135deg,#ff3c6e,#ff9900); color:#fff; border-radius:24px; padding:10px 22px; font-size:16px; font-weight:700; margin:8px 0 14px; }
.scan-again-btn { padding:13px 32px; background:var(--card); border:1px solid var(--border); border-radius:12px; color:var(--text); font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:2px; cursor:pointer; transition:all 0.2s; }
.scan-again-btn:hover { border-color:var(--accent2); color:var(--accent2); }
/* Log */
.log-section { margin-top:28px; }
.log-title { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; color:var(--muted); margin-bottom:12px; display:flex; align-items:center; gap:10px; }
.log-count { background:var(--success); color:#000; font-family:'DM Sans',sans-serif; font-size:11px; font-weight:700; border-radius:20px; padding:2px 9px; letter-spacing:0; }
.log-list { display:flex; flex-direction:column; gap:8px; }
.log-item { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 16px; display:flex; align-items:center; gap:12px; }
.log-icon { font-size:20px; flex-shrink:0; }
.log-info { flex:1; }
.log-name { font-weight:600; font-size:13px; }
.log-meta { font-size:11px; color:var(--muted); margin-top:2px; }
.log-members { font-size:11px; font-weight:600; color:var(--accent2); }
.empty-log { text-align:center; color:var(--muted); font-size:13px; padding:20px; }
@keyframes scanAnim { 0%{top:0} 100%{top:calc(100% - 2px)} }
@keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="event-label">🎉 AfterParty Ticketing System</div>
    <h1>QR<br>SCANNER</h1>
    <p class="subtitle">Scan guest QR codes at the entry gate</p>
  </header>

  <div class="nav-links">
    <a class="nav-btn" href="1-admin-panel.html">🎟️ Admin Panel</a>
    <a class="nav-btn active" href="2-scanner.html">📱 QR Scanner</a>
    <a class="nav-btn" href="3-registration.html">📋 Registration</a>
    <a class="nav-btn" href="4-dashboard.html">📊 Dashboard</a>
  </div>

  <div class="scanner-card" id="scannerCard">
    <div class="scanner-title">Scan QR Code</div>
    <div class="video-wrapper" id="videoWrapper" style="display:none">
      <video id="video" playsinline autoplay muted></video>
      <div class="scan-overlay">
        <div class="scan-frame"><div class="scan-line"></div></div>
      </div>
    </div>
    <div class="scan-status" id="scanStatus">Camera not started</div>
    <button class="start-btn" id="startBtn" onclick="startCamera()">📷 START CAMERA SCAN</button>
    <button class="stop-btn" id="stopBtn" style="display:none" onclick="stopCamera()">⏹ STOP CAMERA</button>

    <div class="manual-section">
      <div class="divider">OR ENTER TICKET ID MANUALLY</div>
      <div class="manual-row">
        <input type="text" class="manual-input" id="manualInput" placeholder="e.g. TKT-ABCD-1234" onkeydown="if(event.key==='Enter')manualScan()"/>
        <button class="manual-btn" onclick="manualScan()">✓ Verify</button>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div id="result">
    <div class="result-card" id="resultCard">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-detail" id="resultDetail"></div>
      <div class="result-sub" id="resultSub"></div>
      <div class="members-big" id="resultMembers" style="display:none"></div>
      <button class="scan-again-btn" onclick="scanAgain()">🔄 SCAN NEXT</button>
    </div>
  </div>

  <!-- Scan Log -->
  <div class="log-section">
    <div class="log-title">Today's Scans <span class="log-count" id="logCount">0</span></div>
    <div class="log-list" id="logList"><div class="empty-log">No scans yet today</div></div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbziK5ejeBR418BAAQDIrsLQFS3CYyZL2TwC0daQkEvkMyfyWhW2JCJes82D1pCtz3TzaA/exec';
let stream = null;
let scanInterval = null;
let scanLog = [];
let isProcessing = false;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    const video = document.getElementById('video');
    video.srcObject = stream;
    document.getElementById('videoWrapper').style.display = 'block';
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'block';
    document.getElementById('scanStatus').textContent = '🔍 Scanning... Point at QR code';
    scanInterval = setInterval(scanFrame, 300);
  } catch (err) {
    document.getElementById('scanStatus').textContent = '❌ Camera access denied. Use manual entry below.';
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
  document.getElementById('videoWrapper').style.display = 'none';
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('scanStatus').textContent = 'Camera stopped';
}

function scanFrame() {
  if (isProcessing) return;
  const video = document.getElementById('video');
  if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
  if (code) {
    isProcessing = true;
    stopCamera();
    processQR(code.data);
  }
}

async function manualScan() {
  const val = document.getElementById('manualInput').value.trim().toUpperCase();
  if (!val) return;
  isProcessing = true;
  await validateTicket(val);
  document.getElementById('manualInput').value = '';
}

async function processQR(rawData) {
  try {
    const parsed = JSON.parse(rawData);
    // Support both minimal format {id, m} and full format {ticketID}
    const ticketID = parsed.id || parsed.ticketID;
    if (!ticketID) throw new Error('No ticket ID found');
    await validateTicket(ticketID);
  } catch {
    showResult('error', '❌', 'INVALID QR CODE', 'This QR code is not recognized', '', null);
    isProcessing = false;
  }
}

async function validateTicket(ticketID) {
  document.getElementById('scanStatus').textContent = '⏳ Verifying ticket...';
  try {
    const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'scanTicket', ticketID }) });
    const data = await res.json();
    if (data.success) {
      showResult('success', '✅', 'ENTRY GRANTED!', data.name, `Ticket: ${ticketID}`, data.members);
      addToLog(data.name, data.members, ticketID, true);
    } else if (data.alreadyUsed) {
      showResult('warning', '⛔', 'ALREADY USED!', data.name, `Scanned at: ${data.scannedAt}`, data.members);
      addToLog(data.name, data.members, ticketID, false);
    } else {
      showResult('error', '❌', 'INVALID TICKET', data.message, ticketID, null);
    }
  } catch (err) {
    showResult('error', '⚠️', 'NETWORK ERROR', 'Check your internet connection', err.message, null);
  }
  isProcessing = false;
}

function showResult(type, icon, title, detail, sub, members) {
  document.getElementById('scannerCard').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  const card = document.getElementById('resultCard');
  card.className = `result-card ${type}`;
  document.getElementById('resultIcon').textContent = icon;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultDetail').textContent = detail;
  document.getElementById('resultSub').textContent = sub;
  const mb = document.getElementById('resultMembers');
  if (members) { mb.style.display = 'inline-flex'; mb.textContent = `👥 ${members} ${members == 1 ? 'Guest' : 'Guests'} Entering`; }
  else { mb.style.display = 'none'; }
}

function scanAgain() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('scannerCard').style.display = 'block';
  document.getElementById('scanStatus').textContent = 'Camera not started';
  isProcessing = false;
}

function addToLog(name, members, ticketID, granted) {
  const time = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  scanLog.unshift({ name, members, ticketID, granted, time });
  const list = document.getElementById('logList');
  document.getElementById('logCount').textContent = scanLog.length;
  list.innerHTML = scanLog.map(s => `
    <div class="log-item">
      <div class="log-icon">${s.granted ? '✅' : '⛔'}</div>
      <div class="log-info">
        <div class="log-name">${s.name || 'Unknown'}</div>
        <div class="log-meta">${s.ticketID} · ${s.time}</div>
      </div>
      <div class="log-members">👥 ${s.members||1}</div>
    </div>`).join('');
}
</script>
</body>
</html>
